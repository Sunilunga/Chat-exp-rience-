<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="flex flex-col md:flex-row h-screen">

    <!-- ================= Sidebar ================= -->

    <aside
        class="w-full md:w-20 h-16 md:h-full bg-violet-600 flex md:flex-col justify-between items-center px-4 md:px-0 py-3 md:py-6">

        <div class="flex md:flex-col items-center gap-4 md:gap-6">

            <a
                href="discussionss.html"
                class="w-11 h-11 rounded-xl flex justify-center items-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-regular fa-message text-xl"></i>

            </a>

            <button
                class="w-11 h-11 rounded-xl flex justify-center items-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-solid fa-phone text-xl"></i>

            </button>

            <button
                class="w-11 h-11 rounded-xl flex justify-center items-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-regular fa-address-book text-xl"></i>

            </button>

        </div>

        <div class="flex md:flex-col gap-4">

            <a
                href="profile.html"
                class="w-11 h-11 rounded-xl bg-white text-violet-600 flex justify-center items-center">

                <i class="fa-solid fa-user"></i>

            </a>

            <button
                class="w-11 h-11 rounded-xl flex justify-center items-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-solid fa-gear"></i>

            </button>

        </div>

    </aside>

    <!-- ================= Contenu ================= -->

    <main class="flex-1 overflow-y-auto">

        <header
            class="bg-white h-16 md:h-20 border-b flex justify-between items-center px-5 md:px-8">

            <h1
                class="text-xl md:text-2xl font-bold text-violet-600">Mon Profil </h1>
            <a
                href="discussionss.html"
                class="text-violet-600 text-xl">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

        </header>
        <!-- ================= Profil ================= -->
        <section
            class="flex flex-col items-center py-8 px-4">
<div class="flex flex-col items-center">

    <!-- Photo -->

    <div class="relative">

        <img
            id="profileImage"
          
            alt="Photo de profil"
            class="w-32 h-32 md:w-40 md:h-40 rounded-full object-cover border-4 border-white shadow-lg">

        <label
            for="imageInput"
            class="absolute bottom-2 right-2 w-10 h-10 rounded-full bg-violet-600 text-white flex items-center justify-center cursor-pointer hover:bg-violet-700 transition">

            <i class="fa-solid fa-camera"></i>

        </label>

        <input
            id="imageInput"
            type="file"
            accept="image/*"
            class="hidden">

    </div>

    <!-- Nom -->

    <h2
        id="profileName"
        class="text-2xl md:text-3xl font-bold mt-6">

        Mon Nom

    </h2>

    <!-- Email -->

    <p
        id="profileEmail"
        class="text-gray-500 mt-2 text-center">

        email@example.com

    </p>

    <!-- Modifier le nom -->

    <button
        id="editNameBtn"
        class="mt-5 px-6 py-3 rounded-xl bg-violet-600 text-white hover:bg-violet-700 transition">

        <i class="fa-solid fa-pen mr-2"></i>

        Modifier le nom

    </button>

</div>

<!-- ================= Modal ================= -->

<div
    id="nameModal"
    class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50">

    <div
        class="bg-white rounded-2xl w-[90%] max-w-sm p-6">

        <h2 class="text-2xl font-bold mb-5">

            Modifier votre nom

        </h2>

        <input
            id="newName"
            type="text"
            placeholder="Entrez votre nouveau nom"
            class="w-full h-12 border rounded-xl px-4 outline-none focus:border-violet-600">

        <div class="flex justify-end gap-3 mt-6">

            <button
                id="cancelName"
                class="px-5 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">

                Annuler

            </button>

            <button
                id="saveName"
                class="px-5 py-2 rounded-lg bg-violet-600 text-white hover:bg-violet-700">

                Enregistrer

            </button>

        </div>

    </div>
</div>

        <!-- Carte Compte -->
<!-- ================= Informations ================= -->

<section class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10 w-[90%] md:w-4/5 mx-auto">

    <!-- Account Details -->

    <div class="bg-white rounded-2xl shadow-lg p-6">

        <div class="flex justify-between items-center mb-6">

            <h3 class="text-xl font-bold">

                Account Details

            </h3>

            <i class="fa-regular fa-id-card text-violet-600 text-2xl"></i>

        </div>

        <div class="space-y-5">

            <div>

                <p class="text-gray-400 text-sm">

                    Full Name

                </p>

                <p
                    id="accountName"
                    class="font-semibold text-lg">

                    Dison

                </p>

            </div>

            <div>

                <p class="text-gray-400 text-sm">

                    Email

                </p>

                <p
                    id="accountEmail"
                    class="font-semibold">

                    email@example.com

                </p>
<p id="profileBio"
   class="text-gray-500 text-center mt-2">
    Aucune bio
</p>

<button
    id="editBioBtn"
    class="mt-4 px-6 py-3 rounded-xl bg-violet-600 text-white hover:bg-violet-700 transition">

    <i class="fa-solid fa-pen mr-2"></i>

    Modifier la bio

</button>
            </div>
         
            <div>

                <p class="text-gray-400 text-sm">Phone </p>

                <p class="font-semibold">

                    +243 ... </p>

            </div>

        </div>

    </div>

    <!-- Privacy & Security -->

    <div class="bg-white rounded-2xl shadow-lg p-6">

        <div class="flex justify-between items-center mb-6">

            <h3 class="text-xl font-bold">

                Privacy & Security

            </h3>

            <i class="fa-solid fa-shield-halved text-violet-600 text-2xl"></i>

        </div>

        <div class="space-y-5">

            <div class="flex justify-between">

                <span>

                    Two-Factor Authentication

                </span>

                <span class="text-green-600">

                    Enabled

                </span>

            </div>

            <div class="flex justify-between">

                <span>

                    Active Sessions

                </span>

                <i class="fa-solid fa-chevron-right"></i>

            </div>

            <div class="flex justify-between">

                <span>

                    Notifications

                </span>

                <i class="fa-solid fa-chevron-right"></i>

            </div>

        </div>

    </div>

</section>
<section class="w-full flex justify-center mt-10 mb-8">

    <div class="w-[90%] md:w-4/5">

        <button
            id="deleteAccountBtn"
            class="w-full h-14 bg-red-600 text-white rounded-2xl font-semibold hover:bg-red-700 transition">

            <i class="fa-solid fa-trash mr-2"></i>

            Se deconneter du compte

        </button>

    </div>

</section>

<footer class="text-center pb-6">

    <p class="text-gray-500">

        © 2026 Kadea Chat

    </p>

</footer>

<script src="main.js/profile.js"></script>

</main>
</div>
</body>
</html>
