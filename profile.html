<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kadea Chat - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-20 bg-white shadow-md flex flex-col items-center py-6 space-y-6">
    <button class="text-blue-500">💬</button>
    <button class="text-blue-500">👥</button>
    <button class="text-blue-500">⚙️</button>
    <button class="text-blue-500">➕</button>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8">
    <!-- Profile Header -->
    <div class="text-center mb-8">
      <img src="whatsApp image.jpg" alt="Profile" class="w-24 h-24 rounded-full mx-auto border-4 border-blue-500">
      <h2 class="text-2xl font-semibold mt-4">Alex Rivera</h2>
      <p class="text-gray-600">alex.rivera@example.com</p>
      <p class="text-sm text-gray-500">Member since October 2023</p>
    </div>

    <!-- Account Details -->
    <div class="bg-white shadow rounded-lg p-6 mb-6">
      <h3 class="text-lg font-semibold mb-4">Account Details</h3>
      <ul class="space-y-2 text-gray-700">
        <li><span class="font-medium">Username:</span> arivera_chat</li>
        <li><span class="font-medium">Phone:</span> +1 (555) 012-3456</li>
        <li><span class="font-medium">Language:</span> English (US)</li>
      </ul>
    </div>

    <!-- Privacy & Security -->
    <div class="bg-white shadow rounded-lg p-6 mb-6">
      <h3 class="text-lg font-semibold mb-4">Privacy & Security</h3>
      <ul class="space-y-2 text-gray-700">
        <li><span class="font-medium">Two-Factor Auth:</span> Enabled</li>
        <li><span class="font-medium">Active Sessions</span></li>
        <li><span class="font-medium">Alert Preferences</span></li>
      </ul>
    </div>

    <!-- Actions -->
    <div class="flex space-x-4">
      <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Edit Profile</button>
      <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Change Password</button>
      <button class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">Logout</button>
    </div>

    <!-- Footer -->
    <footer class="mt-8 text-center text-sm text-gray-500">
      Kadea Chat v1.0.0 — Encryption Active
    </footer>
  </main>
</body>
</html>
