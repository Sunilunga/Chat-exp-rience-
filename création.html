<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-3 sm:p-4 md:p-6">
    <div class="w-full max-w-md sm:max-w-lg md:max-w-2xl bg-white rounded-2xl md:rounded-3xl shadow-xl p-5 sm:p-6 md:p-8">
        <!-- Logo -->
        <div class="text-center mb-6 md:mb-8">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-message text-white text-2xl md:text-3xl"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-purple-600">
                Kadea Chat
            </h1>
        </div>
        <h2 class="text-2xl md:text-4xl font-bold text-gray-800 mb-2">
            Create Account
        </h2>
        <p class="text-gray-500 text-sm md:text-base mb-6">
            Join the community and start chatting.
        </p>
        <form id="registerForm" class="space-y-5 md:space-y-6">
            <!-- Full Name -->
            <div>
                <label class="block mb-2 text-gray-700">
                    Full Name
                </label>

                <div class="relative">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-purple-500"></i>
                    <input
                        type="text"
                        id="fullName"
                        placeholder="Dison Sun"
                        required
                        class="w-full bg-purple-50 rounded-xl pl-12 pr-4 py-3 md:py-4 outline-none focus:ring-2 focus:ring-purple-500">

                </div>

            </div>
                        <!-- Email -->

            <div>

                <label class="block mb-2 text-gray-700">

                    Email Address

                </label>

                <div class="relative">

                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-purple-500"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="name@example.com"
                        required
                        class="w-full bg-purple-50 rounded-xl pl-12 pr-4 py-3 md:py-4 outline-none focus:ring-2 focus:ring-purple-500">

                </div>

            </div>
            <!-- Password -->
            <div>

                <label class="block mb-2 text-gray-700">
                    Password
                </label>

                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-purple-500"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="********"
                        required
                        class="w-full bg-purple-50 rounded-xl pl-12 pr-12 py-3 md:py-4 outline-none focus:ring-2 focus:ring-purple-500">

                    <button
                        type="button"
                        onclick="togglePassword('password')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-purple-500">

                        <i class="fa-regular fa-eye"></i>
                    </button>

                </div>

            </div>
            <!-- Confirm Password -->
            <div>
                <label class="block mb-2 text-gray-700">
                    Confirm Password
                </label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-purple-500"></i>
                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="********"
                        required
                        class="w-full bg-purple-50 rounded-xl pl-12 pr-12 py-3 md:py-4 outline-none focus:ring-2 focus:ring-purple-500">

                    <button
                        type="button"
                        onclick="togglePassword('confirmPassword')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-purple-500">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>
            <!-- Message -->
            <div
                id="message"
                class="hidden rounded-lg p-4">
            </div>
                        <!-- Bouton -->
            <button
                type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 active:bg-purple-800 text-white py-3 md:py-4 rounded-xl text-lg md:text-xl font-semibold transition duration-300">
                Create Account →
            </button>

        </form>

        <!-- Lien Connexion -->
        <div class="text-center mt-6 md:mt-8 text-sm md:text-base">
            <span class="text-gray-600">
                Already have an account?
            </span>
            <a
                href="connexion.html"
                class="text-purple-600 font-semibold hover:text-purple-700 ml-1">
                Log in
            </a>
        </div>

    </div>
<script src="main.js/création.js"></script>
</body>
</html>
