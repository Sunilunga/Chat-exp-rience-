<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Inscription</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-white rounded-3xl shadow-lg p-5">

    <!-- Logo -->
    <div class="text-center mb-8">

        <div class="w-20 h-20 bg-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-message text-white text-3xl"></i>
        </div>

        <h1 class="text-4xl font-bold text-purple-600">
            Kadea Chat
        </h1>

    </div>

    <h2 class="text-4xl font-bold text-gray-800 mb-2">
        Create Account
    </h2>

    <p class="text-gray-500 mb-8">
        Join the community and start chatting.
    </p>

    <form id="registerForm" class="space-y-6">

        <!-- Nom -->

        <div>
            <label class="block mb-2 text-gray-700">
                Full Name
            </label>

            <div class="relative">

                <i class="fa-regular fa-user absolute left-4 top-4 text-purple-500"></i>

                <input
                    type="text"
                    id="fullName"
                    placeholder="John Doe"
                    class="w-full bg-purple-50 rounded-xl pl-12 pr-4 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                    required
                >
            </div>
        </div>

        <!-- Email -->

        <div>
            <label class="block mb-2 text-gray-700">
                Email Address
            </label>

            <div class="relative">

                <i class="fa-regular fa-envelope absolute left-4 top-4 text-purple-500"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="name@example.com"
                    class="w-full bg-purple-50 rounded-xl pl-12 pr-4 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                    required
                >
            </div>
        </div>

        <!-- Password -->

        <div>
            <label class="block mb-2 text-gray-700">
                Password
            </label>

            <div class="relative">

                <i class="fa-solid fa-lock absolute left-4 top-4 text-purple-500"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="********"
                    class="w-full bg-purple-50 rounded-xl pl-12 pr-12 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                    required
                >

                <button
                    type="button"
                    onclick="togglePassword('password')"
                    class="absolute right-4 top-4 text-purple-500"
                >
                    <i class="fa-regular fa-eye"></i>
                </button>

            </div>
        </div>

        <!-- Confirm Password -->

        <div>
            <label class="block mb-2 text-gray-700">
                Confirm Password
            </label>

            <div class="relative">

                <i class="fa-solid fa-lock absolute left-4 top-4 text-purple-500"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="********"
                    class="w-full bg-purple-50 rounded-xl pl-12 pr-12 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                    required
                >

                <button
                    type="button"
                    onclick="togglePassword('confirmPassword')"
                    class="absolute right-4 top-4 text-purple-500"
                >
                    <i class="fa-regular fa-eye"></i>
                </button>

            </div>
        </div>

        <!-- Message -->

        <div id="message" class="hidden rounded-lg p-4"></div>

        <!-- Bouton -->

        <button
            type="submit"
            class="w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-xl text-xl font-semibold transition"
        >
            Create Account →
        </button>

    </form>

    <div class="text-center mt-8">
        Already have an account?
        <a href="login.html" class="text-purple-600 font-semibold">
            Log in
        </a>
    </div>

</div>

<script>

const API_KEY = "wksp_831a5b66c9a8e19184cdd4a1f3119412";

const API_URL =
"https://kadea-chat-api.onrender.com/auth/register";

function togglePassword(id){

    const input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
    }else{
        input.type = "password";
    }

}

const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const fullName =
    document.getElementById("fullName").value.trim();

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    const confirmPassword =
    document.getElementById("confirmPassword").value;

    const message =
    document.getElementById("message");

    if(password !== confirmPassword){

        message.classList.remove("hidden");
        message.className =
        "bg-red-100 text-red-700 rounded-lg p-4";

        message.textContent =
        "Les mots de passe ne correspondent pas.";

        return;
    }

    try{

      const response = await fetch("https://kadea-chat-api.onrender.com/auth/register", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "x-api-key": "wksp_831a5b66c9a8e19184cdd4a1f3119412"
    },
    body: JSON.stringify({
        fullName,
        email,
        password
    })
});

const data = await response.json();

if (response.ok && data.success) {
    alert("✅ Votre compte a été créé avec succès !");
    window.location.href = "login.html";
} else {
    alert("❌ " + (data.message || "Erreur lors de la création du compte."));
}
}catch (error) {
    console.error("Erreur lors de la requête :", error);
    alert("❌ Une erreur est survenue. Veuillez réessayer plus tard.");
}

});  

</script>

</body>
</html>
