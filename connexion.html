<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-[#F9F4F0] flex items-center justify-center min-h-screen py-10">

<div class="w-full max-w-md">

    <!-- Logo -->

    <div class="text-center mb-8">

        <div class="w-20 h-20 bg-purple-500 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
            <i class="fa-solid fa-message text-white text-3xl"></i>
        </div>

        <h1 class="text-5xl font-bold text-purple-500 mt-6">
            Welcome back
        </h1>

        <p class="text-gray-500 text-xl mt-3">
            Please enter your details to sign in to Kadea Chat
        </p>

    </div>

    <!-- Card -->

    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-200">

        <form id="loginForm" class="space-y-6">

            <!-- Email -->

            <div>

                <label class="block text-xl font-medium mb-2">
                    Email Address
                </label>

                <div class="flex items-center bg-[#F5EFF7] rounded-xl px-5">

                    <i class="fa-regular fa-envelope text-purple-500 text-2xl"></i>

                    <input
                        id="email"
                        type="email"
                        placeholder="name@company.com"
                        class="w-full bg-transparent outline-none p-5 text-xl ml-4">

                </div>

            </div>

            <!-- Password -->

            <div>

                <div class="flex justify-between mb-2">

                    <label class="text-xl font-medium">
                        Password
                    </label>

                    <a href="#" class="text-purple-500 text-lg hover:underline">
                        Forgot?
                    </a>

                </div>

                <div class="flex items-center bg-[#F5EFF7] rounded-xl px-5">

                    <i class="fa-solid fa-lock text-purple-500 text-2xl"></i>

                    <input
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        class="w-full bg-transparent outline-none p-5 text-xl ml-4">

                    <button
                        type="button"
                        id="togglePassword">

                        <i
                            id="eyeIcon"
                            class="fa-regular fa-eye text-purple-500 text-2xl cursor-pointer">
                        </i>

                    </button>

                </div>

            </div>

            <!-- Remember -->

            <div class="flex items-center gap-3">

                <input
                    type="checkbox"
                    id="remember"
                    class="w-6 h-6 accent-purple-500">

                <label
                    for="remember"
                    class="text-lg text-gray-700">

                    Keep me signed in

                </label>

            </div>

            <!-- Bouton -->

            <button
                type="submit"
                class="w-full bg-purple-500 hover:bg-purple-600 transition text-white text-2xl font-semibold py-5 rounded-xl">

                Login

            </button>

        </form>

    </div>

    <!-- Footer -->

    <p class="text-center text-gray-600 text-xl mt-8">

        Don't have an account?

        <a
            href="création.html"
            class="text-purple-500 font-semibold hover:underline">

            Create Account

        </a>

    </p>

</div>

<script src="login.js"></script>

</body>
</html>
