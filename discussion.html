<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-[#F8F5F2]">

<div class="flex h-screen">
    <!-- ================= Sidebar ================= -->
    <aside class="w-24 bg-violet-600 flex flex-col justify-between items-center py-8">

        <div class="flex flex-col items-center gap-10">
            <!-- Logo -->
            <div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center">

                <i class="fa-solid fa-message text-violet-600 text-2xl"></i>

            </div>
            <i class="fa-regular fa-message text-white text-2xl cursor-pointer"></i>
            <i class="fa-solid fa-phone text-white text-2xl cursor-pointer"></i>
            <i class="fa-regular fa-user text-white text-2xl cursor-pointer"></i>
            <i class="fa-regular fa-square-plus text-white text-2xl cursor-pointer"></i>

        </div>

        <button>

            <i class="fa-solid fa-gear text-white text-2xl"></i>
   </button>

    </aside>
    <!-- ================= Colonne Gauche ================= -->
    <section class="w-[420px] bg-white border-r flex flex-col">

        <!-- Header -->
        <div class="flex items-center justify-between p-8">

            <div>

                <h1 class="text-4xl font-bold">
                    Chats</h1>
                <p class="text-gray-500 mt-2">

                    Start new conversation </p>
            </div>
            <button>
                <i class="fa-regular fa-pen-to-square text-violet-600 text-3xl"></i>
            </button>
        </div>
        <!-- Recherche -->
        <div class="px-8">

            <div class="flex items-center bg-violet-50 rounded-full px-5 h-16">

                <i class="fa-solid fa-magnifying-glass text-gray-500 text-xl"></i>

                <input
                type="text"
                placeholder="Search conversations..."
                class="bg-transparent w-full ml-4 outline-none text-lg">

            </div>
        </div>
        <!-- Bouton Ajouter un contact -->

<div class="px-8 mt-6">

    <button
        id="addContactBtn"
        class="w-full h-14 bg-violet-600 hover:bg-violet-700 rounded-xl text-white font-semibold transition">

        <i class="fa-solid fa-user-plus mr-2"></i>

        Nouveau contact

    </button>

</div>

        <!-- Zone vide conversations -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <div class="w-28 h-28 rounded-full bg-violet-100 flex items-center justify-center">
                <i class="fa-regular fa-comments text-violet-400 text-5xl"></i>
            </div>
            <h2 class="text-3xl font-bold mt-8">
                No conversations yet</h2>
            <p class="text-gray-500 mt-3 text-lg">
                Start a new conversation
            </p>
        </div>

    </section>
       <!-- ================= Partie droite ================= -->

    <section class="flex-1 flex flex-col bg-[#F8F5F2]">

        <!-- Header -->

        <header class="h-24 bg-white border-b flex items-center justify-end px-8">

            <div class="flex items-center gap-8">

                <button class="text-violet-600 text-2xl hover:text-violet-700">
                    <i class="fa-solid fa-video"></i>
                </button>
                <button class="text-violet-600 text-2xl hover:text-violet-700">
                    <i class="fa-solid fa-phone"></i>
                </button>
                <button class="text-violet-600 text-2xl hover:text-violet-700">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </button>
            </div>
        </header>

        <!-- Zone vide -->
        <main class="flex-1 flex flex-col items-center justify-center">
            <div class="w-36 h-36 rounded-full bg-violet-100 flex items-center justify-center">
                <i class="fa-regular fa-comments text-violet-400 text-6xl"></i>
            </div>
            <h2 class="text-4xl font-bold mt-8">
                No messages yet</h2>

            <p class="text-gray-500 text-xl mt-3">
                Send a message to start the conversation </p>

        </main>

        <!-- Barre message -->

        <footer class="bg-white border-t p-6">

            <div class="flex items-center gap-5">

                <!-- Emoji -->

                <button class="text-violet-600 text-2xl">
                    <i class="fa-regular fa-face-smile"></i>
                </button>
                <!-- Pièce jointe -->
                <button class="text-violet-600 text-2xl">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <!-- Champ -->
                <input
                    type="text"
                    placeholder="Type a message..."
                    class="flex-1 h-14 rounded-full border border-violet-200 px-6 outline-none focus:border-violet-500">
                <!-- Envoyer -->
                <button
                    class="w-14 h-14 rounded-full bg-violet-600 text-white hover:bg-violet-700 transition">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </section>
    
    <script>
      const btn = document.getElementById('toggleTheme');
  btn.addEventListener('click', () => {
    // Toggle the 'dark' class on <html>
    document.documentElement.classList.toggle('dark');
  });
  
    </script>
    <!-- ================= Modal Ajouter Contact ================= -->

<div
id="contactModal"
class="fixed inset-0 bg-black/50 hidden items-center justify-center">

    <div class="bg-white w-[420px] rounded-2xl p-8">

        <h2 class="text-2xl font-bold mb-6">

            Nouveau contact

        </h2>

        <input
        id="contactName"
        type="text"
        placeholder="Nom"
        class="w-full h-12 border rounded-lg px-4 mb-4">

        <input
        id="contactEmail"
        type="email"
        placeholder="Email"
        class="w-full h-12 border rounded-lg px-4 mb-6">

        <div class="flex justify-end gap-3">

            <button
            id="closeModal"
            class="px-5 py-2 rounded-lg bg-gray-200">

                Annuler

            </button>

            <button
            id="saveContact"
            class="px-5 py-2 rounded-lg bg-violet-600 text-white">
                Ajouter </button>

        </div>

    </div>

</div>
</body>
</html>
