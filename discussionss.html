<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- ================= Sidebar ================= -->

    <aside class="w-20 bg-violet-600 flex flex-col justify-between items-center py-6">

        <div class="flex flex-col items-center gap-6">

            <!-- Logo -->

            <div class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center">

                <i class="fa-solid fa-comments text-violet-600 text-2xl"></i>

            </div>

            <a href="discussionss.html"
               class="w-12 h-12 rounded-xl bg-violet-500 flex items-center justify-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-regular fa-message text-xl"></i>

            </a>

            <button
                class="w-12 h-12 rounded-xl flex items-center justify-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-solid fa-phone text-xl"></i>

            </button>

            <button
                class="w-12 h-12 rounded-xl flex items-center justify-center text-white hover:bg-white hover:text-violet-600 transition">
                <i class="fa-regular fa-address-book text-xl"></i>

            </button>

        </div>

        <div class="flex flex-col items-center gap-4">

            <a href="profile.html"
               class="w-12 h-12 rounded-xl flex items-center justify-center text-white hover:bg-white hover:text-violet-600 transition">

                <i class="fa-regular fa-user text-xl"></i>

            </a>

            <button
                class="w-12 h-12 rounded-xl flex items-center justify-center text-white hover:bg-white hover:text-violet-600 transition">
                <i class="fa-solid fa-gear text-xl"></i>
            </button>
        </div>
    </aside>

    <!-- ================= Liste des conversations ================= -->

    <section class="w-[380px] bg-white border-r flex flex-col">

        <!-- Header -->

        <div class="flex items-center justify-between p-6">

            <div>

                <h1 class="text-3xl font-bold">
                    Chats
                </h1>

                <p class="text-gray-500 text-sm">
                    Start new conversation
                </p>

            </div>

            <button
                id="addContactBtn"
                class="w-12 h-12 rounded-full bg-violet-600 text-white hover:bg-violet-700">
                <i class="fa-solid fa-user-plus"></i>

            </button>

        </div>

        <!-- Recherche -->

        <div class="px-6">

            <div class="flex items-center h-12 bg-gray-100 rounded-full px-4">
                <i class="fa-solid fa-magnifying-glass text-gray-500"></i>

                <input
                    id="searchInput"
                    type="text"
                    placeholder="Search..."
                    class="ml-3 w-full bg-transparent outline-none">

            </div>

        </div>
        <!-- Liste des contacts -->
        <div
            id="contactsList"
            class="flex-1 overflow-y-auto mt-4 px-3 space-y-2">
        </div>

    </section>

<!-- ================= Zone de discussion ================= -->

<section class="flex-1 flex flex-col bg-[#F8F5F2]">

    <!-- Header -->

    <header class="h-20 bg-white border-b flex items-center justify-between px-6">

        <div class="flex items-center gap-4">

            <div
                id="chatAvatar"
                class="w-12 h-12 rounded-full bg-violet-600 text-white flex items-center justify-center font-bold text-lg">
                ?
            </div>

            <div>

                <h2
                    id="chatName"
                    class="font-bold text-lg">

                    Sélectionnez un contact

                </h2>

                <p
                    id="chatPhone"
                    class="text-sm text-gray-500">

                    Aucun contact

                </p>

            </div>

        </div>

        <div class="flex items-center gap-5">

            <button class="text-violet-600 text-xl">

                <i class="fa-solid fa-video"></i>

            </button>

            <button class="text-violet-600 text-xl">

                <i class="fa-solid fa-phone"></i>

            </button>

            <a
                href="profile.html"
                class="text-violet-600 text-xl">

                <i class="fa-regular fa-user"></i>

            </a>

        </div>

    </header>

    <!-- Messages -->

    <main
        id="chatMessages"
        class="flex-1 overflow-y-auto p-6 space-y-4">

        <div
            id="emptyState"
            class="flex flex-col items-center justify-center h-full">

            <div class="w-28 h-28 rounded-full bg-violet-100 flex items-center justify-center">

                <i class="fa-regular fa-comments text-violet-500 text-5xl"></i>

            </div>

            <h2 class="text-3xl font-bold mt-6">

                No conversation

            </h2>

            <p class="text-gray-500 mt-2">

                Sélectionnez un contact pour commencer.

            </p>

        </div>

    </main>

    <!-- Footer -->

  <footer class="bg-white border-t p-4">

    <div class="flex items-center gap-3">

        <!-- Emoji -->

        <button
            id="emojiBtn"
            class="w-10 h-10 rounded-full hover:bg-violet-100 text-2xl">

            😊

        </button>

        <!-- Fichier -->

        <button
            id="fileBtn"
            class="w-10 h-10 rounded-full hover:bg-violet-100">

            <i class="fa-solid fa-paperclip text-violet-600"></i>

        </button>

        <input
            id="fileInput"
            type="file"
            class="hidden"
            accept="image/*,video/*,.pdf,.doc,.docx">

        <!-- Message -->

        <input
            id="messageInput"
            type="text"
            placeholder="Écrire un message..."

            class="flex-1 h-12 rounded-full border border-violet-300 px-5 outline-none">

        <!-- Envoyer -->

        <button
            id="sendBtn"
            class="w-12 h-12 rounded-full bg-violet-600 text-white hover:bg-violet-700">

            <i class="fa-solid fa-paper-plane"></i>

        </button>

    </div>

    <!-- Liste des emojis -->

    <div
        id="emojiPanel"
        class="hidden mt-3 bg-white border rounded-xl p-3 flex flex-wrap gap-2">

        <button class="emoji">😀</button>
        <button class="emoji">😂</button>
        <button class="emoji">🤣</button>
        <button class="emoji">😍</button>
        <button class="emoji">🥰</button>
        <button class="emoji">❤️</button>
        <button class="emoji">🔥</button>
        <button class="emoji">👍</button>
        <button class="emoji">👏</button>
        <button class="emoji">🎉</button>
        <button class="emoji">😎</button>
        <button class="emoji">😭</button>
        <button class="emoji">🙏</button>

    </div>

</footer>

</section>
<!-- ================= Modal Ajouter un contact ================= -->

<div
    id="contactModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center">

    <div class="bg-white rounded-2xl w-[420px] p-6">

        <h2 class="text-2xl font-bold mb-6">

            Nouveau contact

        </h2>

        <input
            id="contactName"
            type="text"
            placeholder="Nom du contact"
            class="w-full h-12 border rounded-xl px-4 mb-4 outline-none focus:border-violet-600">

        <input
            id="contactPhone"
            type="text"
            placeholder="Numéro de téléphone"
            class="w-full h-12 border rounded-xl px-4 mb-6 outline-none focus:border-violet-600">

        <div class="flex justify-end gap-3">

            <button
                id="closeModal"
                class="px-5 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">

                Annuler

            </button>

            <button
                id="saveContact"
                class="px-5 py-2 rounded-lg bg-violet-600 text-white hover:bg-violet-700">

                Ajouter

            </button>
<input
    id="fileInput"
    type="file"
    class="hidden"
    accept="image/*,video/*,.pdf,.doc,.docx">
        </div>

    </div>

</div>
<script src="main.js/discussionss.js"></script>

</body>
</html>
