<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-gray-100 overflow-hidden">

<div class="flex h-screen">

    <!-- ================= Sidebar ================= -->

    <aside
        class="hidden md:flex w-20 bg-violet-600 flex-col justify-between items-center py-6">

        <div class="flex flex-col items-center gap-6">

            <div
                class="w-14 h-14 rounded-2xl bg-white flex items-center justify-center">

                <i class="fa-solid fa-comments text-violet-600 text-2xl"></i>

            </div>

            <a
                href="discussionss.html"
                class="w-12 h-12 rounded-xl bg-violet-500 flex items-center justify-center text-white hover:bg-white hover:text-violet-600 duration-200">

                <i class="fa-regular fa-message text-xl"></i>

            </a>

            <button
                class="w-12 h-12 rounded-xl text-white hover:bg-white hover:text-violet-600 duration-200">

                <i class="fa-solid fa-phone text-xl"></i>

            </button>

            <button
                class="w-12 h-12 rounded-xl text-white hover:bg-white hover:text-violet-600 duration-200">

                <i class="fa-regular fa-address-book text-xl"></i>

            </button>

        </div>

        <div class="flex flex-col gap-4">

            <a
                href="profile.html"
                class="w-12 h-12 rounded-xl flex justify-center items-center text-white hover:bg-white hover:text-violet-600 duration-200">

                <i class="fa-regular fa-user text-xl"></i>

            </a>

            <button
                class="w-12 h-12 rounded-xl text-white hover:bg-white hover:text-violet-600 duration-200">

                <i class="fa-solid fa-gear text-xl"></i>

            </button>

        </div>

    </aside>

    <!-- ================= Conversations ================= -->

    <section
        id="contactsPanel"
        class="w-full md:w-96 bg-white border-r flex flex-col">

        <!-- Header -->

        <div class="flex justify-between items-center p-5">

            <div>

                <h1 class="text-2xl md:text-3xl font-bold">

                    Chats

                </h1>

                <p class="text-gray-500 text-sm">

                    Start new conversation

                </p>

            </div>

            <button
                id="addContactBtn"
                class="w-11 h-11 md:w-12 md:h-12 rounded-full bg-violet-600 text-white hover:bg-violet-700">

                <i class="fa-solid fa-user-plus"></i>

            </button>

        </div>

        <!-- Recherche -->

        <div class="px-5">

            <div
                class="flex items-center bg-gray-100 rounded-full px-4 h-11">

                <i
                    class="fa-solid fa-magnifying-glass text-gray-500"></i>

                <input
                    id="searchInput"
                    type="text"
                    placeholder="Search..."

                    class="ml-3 flex-1 bg-transparent outline-none">

            </div>

        </div>

        <!-- Contacts -->

        <div
            id="contactsList"
            class="flex-1 overflow-y-auto mt-4 px-2 space-y-2">

        </div>

    </section>
    <!-- ================= Zone de discussion ================= -->

<section
    id="chatPanel"
    class="hidden md:flex flex-1 flex-col bg-[#F8F5F2]">

    <!-- Header -->

    <header
        class="bg-white border-b h-16 md:h-20 flex items-center justify-between px-4 md:px-6">

        <div class="flex items-center gap-3">

            <!-- Retour mobile -->

            <button
                id="backBtn"
                class="md:hidden text-violet-600 text-xl">

                <i class="fa-solid fa-arrow-left"></i>

            </button>

            <!-- Avatar -->

            <div
                id="chatAvatar"
                class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-violet-600 text-white flex items-center justify-center font-bold">

                ?

            </div>

            <!-- Infos -->

            <div>

                <h2
                    id="chatName"
                    class="font-bold text-base md:text-lg">

                    Sélectionnez un contact

                </h2>

                <p
                    id="chatPhone"
                    class="text-xs md:text-sm text-gray-500">

                    Aucun contact

                </p>

            </div>

        </div>

        <!-- Actions -->

        <div class="flex items-center gap-4 md:gap-6">

            <button
                class="text-violet-600 hover:scale-110 duration-200">

                <i class="fa-solid fa-video text-lg md:text-xl"></i>

            </button>

            <button
                class="text-violet-600 hover:scale-110 duration-200">

                <i class="fa-solid fa-phone text-lg md:text-xl"></i>

            </button>

            <a
                href="profile.html"
                class="text-violet-600 hover:scale-110 duration-200">

                <i class="fa-regular fa-user text-lg md:text-xl"></i>

            </a>

        </div>

    </header>

    <!-- Messages -->

    <main
        id="chatMessages"
        class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">

        <div
            id="emptyState"
            class="flex flex-col items-center justify-center h-full text-center">

            <div
                class="w-24 h-24 md:w-32 md:h-32 rounded-full bg-violet-100 flex items-center justify-center">

                <i
                    class="fa-regular fa-comments text-violet-500 text-5xl md:text-6xl">

                </i>

            </div>

            <h2
                class="text-2xl md:text-4xl font-bold mt-6">

                No conversation

            </h2>

            <p
                class="text-gray-500 mt-3 text-sm md:text-base">

                Sélectionnez un contact pour commencer.

            </p>

        </div>

    </main>

    <!-- Footer -->

    <footer
        class="bg-white border-t p-3 md:p-4">

        <div
            class="flex items-center gap-2 md:gap-3">

            <!-- Emoji -->

            <button
                id="emojiBtn"
                class="w-10 h-10 rounded-full hover:bg-violet-100 text-2xl">

                😊

            </button>

            <!-- Pièce jointe -->

            <button
                id="fileBtn"
                class="w-10 h-10 rounded-full hover:bg-violet-100">

                <i
                    class="fa-solid fa-paperclip text-violet-600">

                </i>

            </button>

            <input
                id="fileInput"
                type="file"
                class="hidden"
                accept="image/*,video/*,.pdf,.doc,.docx">

            <!-- Message -->

            <input
                id="messageInput"
                type="text"
                placeholder="Écrire un message..."

                class="flex-1 h-10 md:h-12 border rounded-full px-4 md:px-5 outline-none focus:border-violet-600 text-sm md:text-base">

            <!-- Envoyer -->

            <button
                id="sendBtn"
                class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-violet-600 text-white hover:bg-violet-700 hover:scale-105 duration-200">

                <i
                    class="fa-solid fa-paper-plane">

                </i>

            </button>

        </div>

        <!-- Emojis -->

        <div
            id="emojiPanel"
            class="hidden mt-4 bg-white border rounded-xl p-3 flex flex-wrap gap-2">

            <button class="emoji text-2xl">😀</button>
            <button class="emoji text-2xl">😂</button>
            <button class="emoji text-2xl">🤣</button>
            <button class="emoji text-2xl">😍</button>
            <button class="emoji text-2xl">🥰</button>
            <button class="emoji text-2xl">❤️</button>
            <button class="emoji text-2xl">🔥</button>
            <button class="emoji text-2xl">👍</button>
            <button class="emoji text-2xl">👏</button>
            <button class="emoji text-2xl">🎉</button>
            <button class="emoji text-2xl">😎</button>
            <button class="emoji text-2xl">😭</button>
            <button class="emoji text-2xl">🙏</button>
            <button class="emoji text-2xl">😤</button>
            <button class="emoji text-2xl">🥺</button>
            <button class="emoji text-2xl">👀</button>
            <button class="emoji text-2xl">👄</button>
           <button class="emoji text-2xl">🖕🏼</button>
           <button class="emoji text-2xl">👻</button>

        </div>

    </footer>

</section>
<!-- ================= Modal Ajouter un contact ================= -->
<div
    id="contactModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">

    <div
        class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-6">

            <h2 class="text-2xl font-bold">
                Nouveau contact</h2>

            <button
                id="closeModal"
                class="w-10 h-10 rounded-full hover:bg-gray-100">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <!-- Nom -->
        <div class="mb-4">
            <label class="font-medium">
                Nom
            </label>

            <input
                id="contactName"
                type="text"
                placeholder="Nom du contact"
                class="mt-2 w-full h-12 border rounded-xl px-4 outline-none focus:border-violet-600">
        </div>
        <!-- Téléphone -->
        <div class="mb-6">

            <label class="font-medium">
                Téléphone
            </label>

            <input

                id="contactPhone"
                type="tel"
                placeholder="+243..."
                class="mt-2 w-full h-12 border rounded-xl px-4 outline-none focus:border-violet-600">
        </div>

        <!-- Boutons -->

        <div class="flex justify-end gap-3">

            <button

                id="cancelBtn"
                class="px-6 py-3 rounded-xl bg-gray-200 hover:bg-gray-300">
                Annuler
            </button>

            <button
                id="saveContact"
                class="px-6 py-3 rounded-xl bg-violet-600 text-white hover:bg-violet-700">
                Ajouter
            </button>

        </div>

    </div>
</div>
<!-- ================= Toast ================= -->
<div
    id="toast"
    class="hidden fixed top-5 right-5 bg-violet-600 text-white px-6 py-3 rounded-xl shadow-lg z-50">
    Contact ajouté avec succès
</div>

<script src="main.js/discussionss.js"></script>

</body>
</html>
